<!DOCTYPE html>
<html lang="en">
<head>
    <title>Jarvis AI - Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <style>
        :root {
            --bg-primary: #fbfbfa;
            --text-primary: #181816;
            --text-secondary: #706f6c;
            --ui-accent: #181816;
            --ui-subtle: #f0f0ee;
            --radius-pill: 9999px;
            --transition-smooth: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
            
            --success-color: #10b981;
            --error-color: #ef4444;
        }

        [data-theme="dark"] {
            --bg-primary: #0a0a0a;
            --text-primary: #f5f5f5;
            --text-secondary: #8a8a8a;
            --ui-accent: #f5f5f5;
            --ui-subtle: #1a1a1a;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            transition: background-color 0.25s, color 0.25s;
            padding: 20px;
        }

        .header-nav {
            position: absolute;
            top: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            z-index: 10;
        }

        .brand-title {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .toggle-pill {
            width: 36px; height: 20px; border-radius: 10px;
            background: var(--ui-subtle); border: none; cursor: pointer;
            position: relative; transition: background .2s; flex-shrink: 0;
        }
        .toggle-pill::after {
            content: ''; position: absolute; top: 2px; left: 2px;
            width: 16px; height: 16px; border-radius: 50%;
            background: #fff; transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2);
        }
        .toggle-pill.on { background: var(--text-primary); }
        .toggle-pill.on::after { transform: translateX(16px); }

        .auth-card {
            width: 100%;
            max-width: 360px;
            animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
            display: flex;
            flex-direction: column;
            gap: 28px;
            z-index: 5;
        }

        .desktop-form-layout { display: none; }
        .mobile-form-layout { display: flex; flex-direction: column; }

        @media (min-width: 768px) {
            .mobile-form-layout { display: none; }
            .desktop-form-layout { display: flex; flex-direction: column; }
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .auth-header {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .auth-header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.03em;
        }

        .auth-header p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .auth-header p a {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 600;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
            position: relative;
        }

        .form-group label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-secondary);
            padding-left: 2px;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
            border-radius: 12px;
        }

        .d-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--ui-subtle);
            border: 1.5px solid transparent;
            border-radius: 12px;
            font-size: 14.5px;
            color: var(--text-primary);
            outline: none;
            transition: border-color .15s, background .15s;
        }

        .d-input:focus {
            border-color: var(--text-primary);
            background: var(--bg-primary);
        }

        .input-overlay-border {
            position: absolute;
            inset: 0;
            border-radius: 12px;
            border: 2px solid transparent;
            pointer-events: none;
            transition: var(--transition-smooth);
            z-index: 2;
        }

        .input-wrapper.valid .input-overlay-border {
            border-color: var(--success-color);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
        }

        .input-wrapper.invalid .input-overlay-border {
            border-color: var(--error-color);
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
        }

        .d-action-btn {
            width: 100%;
            padding: 14px;
            background: var(--text-primary);
            color: var(--bg-primary);
            border: none;
            border-radius: 12px;
            font-size: 14.5px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity .15s, transform .1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
        }

        .d-action-btn:hover { opacity: .88; }
        .d-action-btn:active { transform: scale(.98); }
        .d-action-btn:disabled { opacity: 0.7; cursor: not-allowed; }

        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.25);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        [data-theme="light"] .d-action-btn .spinner {
            border: 2px solid rgba(0, 0, 0, 0.15);
            border-top-color: var(--bg-primary);
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #pageTransition {
            position: fixed; inset: 0; background: var(--bg-primary);
            z-index: 9999; pointer-events: none; opacity: 1;
        }

        .flash-msg {
            font-size: 13px; color: var(--error-color);
            padding: 4px 2px; font-weight: 500;
        }
    </style>
    <script>
        (function() {
            const savedTheme = localStorage.getItem('jarvis-theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
</head>
<body>

    <div id="pageTransition"></div>

    <header class="header-nav">
        <div class="brand-title">Jarvis AI</div>
        <button class="toggle-pill" id="themeToggle" aria-label="Toggle dark mode"></button>
    </header>

    <main class="auth-card">
        <div class="auth-header">
            <h1>Welcome back</h1>
            <p>Don't have an account? <a href="/signup">Sign up</a></p>
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="flash-msg">{{ messages[0] }}</div>
          {% endif %}
        {% endwith %}

        <form id="loginForm" class="mobile-form-layout" action="/login" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <input type="text" id="username" name="username" class="d-input" placeholder="Enter username" required autocomplete="username">
                    <div class="input-overlay-border"></div>
                </div>
            </div>
            <div class="form-group">
                <label for="loginPwd">Password</label>
                <div class="input-wrapper" id="passWrapperMobile">
                    <input type="password" id="loginPwd" name="password" class="d-input" placeholder="••••••••" required autocomplete="current-password">
                    <div class="input-overlay-border"></div>
                </div>
            </div>
            <button type="submit" class="d-action-btn" id="loginBtn">
                <span class="spinner" id="loginSpinner"></span>
                <span id="loginBtnText">Sign In</span>
            </button>
        </form>

        <form id="loginFormDesk" class="desktop-form-layout" action="/login" method="POST">
            <div class="form-group">
                <label for="usernameDesk">Username</label>
                <div class="input-wrapper">
                    <input type="text" id="usernameDesk" name="username" class="d-input" placeholder="Enter username" required autocomplete="username">
                    <div class="input-overlay-border"></div>
                </div>
            </div>
            <div class="form-group">
                <label for="loginPwdDesk">Password</label>
                <div class="input-wrapper" id="passWrapperDesk">
                    <input type="password" id="loginPwdDesk" name="password" class="d-input" placeholder="••••••••" required autocomplete="current-password">
                    <div class="input-overlay-border"></div>
                </div>
            </div>
            <button type="submit" class="d-action-btn" id="loginBtnDesk">
                <span class="spinner" id="loginSpinnerDesk"></span>
                <span id="loginBtnTextDesk">Sign In</span>
            </button>
        </form>
    </main>

    <script>
        // Theme Toggle Processing Engine 
        const themeToggle = document.getElementById('themeToggle');
        function updateToggleState() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            themeToggle.classList.toggle('on', currentTheme === 'dark');
        }
        themeToggle.addEventListener('click', () => {
            const target = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('jarvis-theme', target);
            updateToggleState();
        });
        window.addEventListener('storage', (e) => {
            if (e.key === 'jarvis-theme') {
                document.documentElement.setAttribute('data-theme', e.newValue);
                updateToggleState();
            }
        });
        updateToggleState();

        // Real-time Active Input Password Validation Highlights (Overlay Engine)
        function attachPassValidation(inputId, wrapperId) {
            const input = document.getElementById(inputId);
            const wrapper = document.getElementById(wrapperId);
            if (!input || !wrapper) return;

            input.addEventListener('input', () => {
                const val = input.value;
                if (val.length >= 6) {
                    wrapper.classList.add('valid');
                    wrapper.classList.remove('invalid');
                } else if (val.length > 0) {
                    wrapper.classList.add('invalid');
                    wrapper.classList.remove('valid');
                } else {
                    wrapper.classList.remove('valid', 'invalid');
                }
            });
        }
        attachPassValidation('loginPwd', 'passWrapperMobile');
        attachPassValidation('loginPwdDesk', 'passWrapperDesk');

        // Form Submit Interceptors and Transition Spinners
        function bindLoginCheck(formId, buttonId, textId, spinnerId) {
            const form = document.getElementById(formId);
            if (!form) return;
            form.addEventListener('submit', () => {
                document.getElementById(buttonId).disabled = true;
                document.getElementById(textId).textContent = 'Logging in...';
                document.getElementById(spinnerId).style.display = 'block';
            });
        }
        bindLoginCheck('loginForm', 'loginBtn', 'loginBtnText', 'loginSpinner');
        bindLoginCheck('loginFormDesk', 'loginBtnDesk', 'loginBtnTextDesk', 'loginSpinnerDesk');

        /* Page Motion Transition Controllers matched with original scripts */
        (function(){
            const ov = document.getElementById('pageTransition');
            ov.style.opacity = '1'; 
            ov.style.transition = 'none';
            requestAnimationFrame(() => requestAnimationFrame(() => {
                ov.style.transition = 'opacity 0.55s cubic-bezier(0.4,0,0.2,1)';
                ov.style.opacity = '0';
            }));
            function goTo(url) {
                ov.style.transition = 'opacity 0.4s cubic-bezier(0.4,0,0.2,1)';
                ov.style.opacity = '1'; 
                ov.style.pointerEvents = 'all';
                setTimeout(() => location.href = url, 420);
            }
            document.addEventListener('click', function(e) {
                const a = e.target.closest('a[href]');
                if(!a) return;
                const href = a.getAttribute('href');
                if(!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('mailto')) return;
                e.preventDefault();
                goTo(href);
            });
            document.addEventListener('submit', function() {
                setTimeout(() => {
                    ov.style.transition = 'opacity 0.3s ease';
                    ov.style.opacity = '0.5';
                }, 350);
            });
        })();
    </script>
</body>
</html>
