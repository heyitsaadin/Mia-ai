<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error | Jarvis AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: radial-gradient(circle at top left, #f5e3b0 0%, #e5e7eb 40%, #d1d5db 100%);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(245, 227, 176, 0.4);
            animation: float linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 480px;
            width: 100%;
            animation: fadeUp 0.8s cubic-bezier(.22,1,.36,1) both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-code {
            font-size: clamp(100px, 28vw, 180px);
            font-weight: 900;
            color: #1f2937;
            line-height: 1;
            letter-spacing: -4px;
            animation: popIn 0.6s cubic-bezier(.22,1,.36,1) 0.2s both;
            text-shadow: 4px 4px 0px rgba(245,227,176,0.8), 8px 8px 0px rgba(0,0,0,0.05);
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

        .illustration {
            margin: -20px auto 0;
            width: clamp(180px, 50vw, 260px);
            animation: bobble 3s ease-in-out infinite, fadeUp 0.8s cubic-bezier(.22,1,.36,1) 0.3s both;
        }

        @keyframes bobble {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        .illustration svg {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.15));
        }

        .title {
            font-size: clamp(22px, 6vw, 30px);
            font-weight: 900;
            color: #1f2937;
            margin: 16px 0 8px;
            animation: fadeUp 0.8s cubic-bezier(.22,1,.36,1) 0.4s both;
        }

        .subtitle {
            font-size: clamp(13px, 3.5vw, 16px);
            color: #6b7280;
            margin-bottom: 32px;
            animation: fadeUp 0.8s cubic-bezier(.22,1,.36,1) 0.5s both;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #1f2937 0%, #374151 100%);
            color: #f5e3b0;
            font-family: 'Nunito', sans-serif;
            font-size: 16px;
            font-weight: 700;
            padding: 14px 36px;
            border-radius: 50px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(31,41,55,0.3);
            animation: fadeUp 0.8s cubic-bezier(.22,1,.36,1) 0.6s both;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.04);
            box-shadow: 0 8px 30px rgba(31,41,55,0.4);
        }

        .btn:active { transform: translateY(0) scale(0.98); }

        .signal {
            position: fixed;
            border-radius: 50%;
            border: 2px solid rgba(245,227,176,0.3);
            animation: pulse 3s ease-out infinite;
            pointer-events: none;
        }

        .signal:nth-child(1) { width: 200px; height: 200px; top: -100px; right: -100px; animation-delay: 0s; }
        .signal:nth-child(2) { width: 350px; height: 350px; top: -175px; right: -175px; animation-delay: 0.5s; }
        .signal:nth-child(3) { width: 500px; height: 500px; top: -250px; right: -250px; animation-delay: 1s; }

        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(0.95); }
            50% { opacity: 0.2; transform: scale(1.05); }
            100% { opacity: 0.6; transform: scale(0.95); }
        }

        .brand {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 10px;
            animation: fadeUp 0.6s cubic-bezier(.22,1,.36,1) both;
        }

        .brand-logo {
            width: 36px;
            height: 36px;
            background: #1f2937;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-name {
            font-size: 18px;
            font-weight: 900;
            color: #1f2937;
            letter-spacing: 2px;
        }

        /* Spark animation for 500 */
        @keyframes spark {
            0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
            50% { opacity: 1; transform: scale(1) rotate(180deg); }
        }

        .spark {
            position: absolute;
            animation: spark 1.5s ease-in-out infinite;
        }
    </style>
</head>
<body>

    <div class="signal"></div>
    <div class="signal"></div>
    <div class="signal"></div>

    <div class="particles" id="particles"></div>

    <div class="brand">
        <div class="brand-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="#f5e3b0" stroke-width="2.5" stroke-linecap="round">
                <rect x="3" y="3" width="18" height="18" rx="4"/>
                <path d="M8 12h8M12 8v8"/>
            </svg>
        </div>
        <span class="brand-name">JARVIS</span>
    </div>

    <div class="container">
        <div class="error-code">500</div>

        <div class="illustration">
            <svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
                <!-- Shadow -->
                <ellipse cx="100" cy="210" rx="55" ry="8" fill="rgba(0,0,0,0.1)"/>

                <!-- Body -->
                <rect x="55" y="110" width="90" height="75" rx="18" fill="#1f2937"/>
                <rect x="65" y="120" width="70" height="50" rx="10" fill="#374151"/>

                <!-- Screen - glitching -->
                <rect x="72" y="127" width="56" height="36" rx="6" fill="#ef4444" opacity="0.2"/>
                <text x="100" y="143" font-family="Nunito" font-size="8" fill="#ef4444" text-anchor="middle" font-weight="700">SYSTEM</text>
                <text x="100" y="155" font-family="Nunito" font-size="8" fill="#ef4444" text-anchor="middle" font-weight="700">CRASH!</text>

                <!-- Neck -->
                <rect x="88" y="95" width="24" height="18" rx="6" fill="#374151"/>

                <!-- Head - tilted slightly -->
                <rect x="50" y="45" width="100" height="55" rx="20" fill="#1f2937" transform="rotate(-5 100 72)"/>

                <!-- Eyes - one broken -->
                <rect x="65" y="58" width="22" height="16" rx="8" fill="#f5e3b0" transform="rotate(-5 76 66)"/>
                <rect x="108" y="60" width="22" height="16" rx="8" fill="#f5e3b0"/>

                <!-- Left eye - X (broken) -->
                <line x1="68" y1="60" x2="78" y2="70" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" transform="rotate(-5 73 65)"/>
                <line x1="78" y1="60" x2="68" y2="70" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" transform="rotate(-5 73 65)"/>

                <!-- Right eye - normal but spinning -->
                <circle cx="119" cy="68" r="5" fill="#1f2937"/>
                <circle cx="121" cy="66" r="2" fill="white"/>

                <!-- Mouth - distressed -->
                <path d="M 80 84 Q 100 95 120 84" stroke="#f5e3b0" stroke-width="2.5" fill="none" stroke-linecap="round"/>

                <!-- Antenna - broken/bent -->
                <line x1="100" y1="45" x2="95" y2="30" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
                <line x1="95" y1="30" x2="110" y2="18" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
                <circle cx="112" cy="15" r="7" fill="#ef4444">
                    <animate attributeName="opacity" values="1;0.2;1" dur="0.5s" repeatCount="indefinite"/>
                </circle>

                <!-- Sparks from antenna -->
                <text x="118" y="12" font-size="12" class="spark" style="animation-delay:0s">⚡</text>
                <text x="125" y="22" font-size="10" class="spark" style="animation-delay:0.5s">✦</text>
                <text x="108" y="5" font-size="8" class="spark" style="animation-delay:1s">⚡</text>

                <!-- Arms - one raised in panic -->
                <rect x="22" y="100" width="35" height="14" rx="7" fill="#1f2937" transform="rotate(-50 22 100)"/>
                <rect x="143" y="115" width="35" height="14" rx="7" fill="#1f2937" transform="rotate(15 143 115)"/>

                <!-- Hands -->
                <circle cx="8" cy="88" r="10" fill="#374151"/>
                <circle cx="178" cy="138" r="10" fill="#374151"/>

                <!-- Legs -->
                <rect x="68" y="183" width="22" height="22" rx="8" fill="#1f2937"/>
                <rect x="110" y="183" width="22" height="22" rx="8" fill="#1f2937"/>

                <!-- Exclamation marks -->
                <text x="22" y="75" font-family="Nunito" font-size="22" font-weight="900" fill="#ef4444" opacity="0.6">!</text>
                <text x="158" y="65" font-family="Nunito" font-size="18" font-weight="900" fill="#ef4444" opacity="0.5">!</text>
            </svg>
        </div>

        <h1 class="title">This Serverless Function has crashed!</h1>
        <p class="subtitle">Something went wrong on our end. We're working on fixing it!</p>
        <a href="/" class="btn">🏠 Go to Home</a>
    </div>

    <script>
        const container = document.getElementById('particles');
        for (let i = 0; i < 15; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 20 + 5;
            p.style.cssText = `
                width: ${size}px;
                height: ${size}px;
                left: ${Math.random() * 100}%;
                animation-duration: ${Math.random() * 10 + 8}s;
                animation-delay: ${Math.random() * 8}s;
            `;
            container.appendChild(p);
        }
    </script>
</body>
</html>
